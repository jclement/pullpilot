# Example PullPilot deployment — drop it into your stack.
#
# By default PullPilot manages only the containers in THIS compose project,
# nightly at 03:00, soaking new images for 24h and rolling back any update that
# fails its healthcheck.
#
# It mounts the Docker socket to do its job (like Watchtower). That makes it a
# root-equivalent component — see the README "Security" section. For the
# strongest isolation, run Docker rootless.

services:
  pullpilot:
    image: ghcr.io/jclement/pullpilot:stable
    container_name: pullpilot
    environment:
      PP_TIMEZONE: America/Edmonton
      PP_SOAK: 24h
      PP_DATA_DIR: /data
      # PP_NOTIFY_URL: "discord://token@id"   # optional shoutrrr notifications
      #
      # Instant updates via webhook (off by default). Requires a PERSISTENT data
      # volume — otherwise the webhook identity (and URL) changes on restart.
      # PP_WEBHOOK: "true"
      # PP_WEBHOOK_URL: https://pullpilot-relay.jeffrey-clement.workers.dev
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - pullpilot-data:/data
      # Private registries: mount your Docker auth read-only so PullPilot can
      # pull private images. It runs as root (below), so its home is /root.
      # Run `docker login <registry>` first; the file must contain inline
      # "auths" (a server login with NO credential helper — `credsStore`/
      # `credHelpers` keep tokens in the OS keychain, which a container can't read).
      # - ${HOME}/.docker/config.json:/root/.docker/config.json:ro
    user: "0:0"                          # root, to access the docker socket
    read_only: true                      # cheap hardening: nothing writes the rootfs
    cap_drop: [ALL]
    security_opt: [no-new-privileges:true]
    tmpfs: [/tmp]
    restart: unless-stopped

volumes:
  pullpilot-data:
