name: worker-bootstrap

# One-shot manual setup: create the KV namespaces (if not already set), commit
# their ids into wrangler.toml, then deploy the worker to TEST and PRODUCTION.
# Safe to re-run — namespace creation is skipped once ids are committed.

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  bootstrap:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: worker
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: npm ci

      - name: Create KV namespaces (if needed) and commit ids
        run: |
          set -euo pipefail
          if grep -q REPLACE_WITH_PROD_KV_ID wrangler.toml; then
            echo "Creating KV namespaces…"
            PROD_OUT="$(npx wrangler kv namespace create PULLPILOT_REGISTRY 2>&1)"; echo "$PROD_OUT"
            TEST_OUT="$(npx wrangler kv namespace create PULLPILOT_REGISTRY_TEST 2>&1)"; echo "$TEST_OUT"
            PROD_ID="$(printf '%s' "$PROD_OUT" | grep -oE '[0-9a-f]{32}' | head -1)"
            TEST_ID="$(printf '%s' "$TEST_OUT" | grep -oE '[0-9a-f]{32}' | head -1)"
            if [ -z "$PROD_ID" ] || [ -z "$TEST_ID" ]; then
              echo "Failed to parse KV namespace ids" >&2; exit 1
            fi
            echo "prod=$PROD_ID test=$TEST_ID"
            sed -i "s/REPLACE_WITH_PROD_KV_ID/$PROD_ID/g; s/REPLACE_WITH_TEST_KV_ID/$TEST_ID/g" wrangler.toml
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add wrangler.toml
            git commit -m "worker: set KV namespace ids [skip ci]"
            git push
          else
            echo "KV ids already set — skipping creation."
          fi

      - name: Deploy worker to TEST
        run: npx wrangler deploy --env test

      - name: Deploy worker to PRODUCTION
        run: npx wrangler deploy --env production --var WORKER_VERSION:bootstrap
